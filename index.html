<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bajet</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"><\/script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f4f1ec;--card:#faf8f5;--card2:#f0ece5;--border:#e2ddd6;--border2:#d4cec6;
  --ink:#1a1713;--ink2:#4a453e;--ink3:#9a9188;--ink4:#c8c2b8;
  --housing:#c0392b;--vehicle:#2471a3;--kids:#7d3c98;--utility:#1e8449;
  --food:#d35400;--other:#5d6d7e;--misc:#b7950b;--insurance:#16a085;
  --loan:#8e44ad;--savings:#27ae60;--sidebar:230px;
}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);}
input,select,textarea,button{font-family:'Plus Jakarta Sans',sans-serif;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}

/* AUTH */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;background:var(--bg);}
.auth-box{background:var(--card);border:2px solid var(--ink);border-radius:16px;padding:2.5rem;width:100%;max-width:400px;box-shadow:4px 4px 0 var(--ink3);}
.auth-logo{display:flex;align-items:center;gap:0.6rem;margin-bottom:2rem;}
.auth-logo .lmark{width:36px;height:36px;border-radius:8px;background:var(--ink);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;color:var(--bg);}
.auth-logo span{font-size:1.4rem;font-weight:800;letter-spacing:-0.04em;}
.auth-box h2{font-size:1.3rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:0.3rem;}
.auth-box p{color:var(--ink3);font-size:0.82rem;margin-bottom:1.75rem;}
.auth-tabs{display:flex;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:3px;margin-bottom:1.5rem;}
.auth-tab{flex:1;padding:0.45rem;text-align:center;font-size:0.8rem;font-weight:700;border-radius:6px;cursor:pointer;border:none;background:none;color:var(--ink3);transition:all 0.15s;}
.auth-tab.active{background:var(--ink);color:var(--bg);}
.afield{margin-bottom:1rem;}
.afield label{display:block;font-size:0.65rem;font-weight:700;color:var(--ink3);margin-bottom:5px;letter-spacing:0.1em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;}
.afield input{width:100%;background:var(--bg);border:1.5px solid var(--border2);border-radius:8px;padding:0.65rem 0.9rem;color:var(--ink);font-size:0.9rem;outline:none;transition:border-color 0.15s;}
.afield input:focus{border-color:var(--ink);}
.btn-auth{width:100%;background:var(--ink);color:var(--bg);border:none;border-radius:8px;padding:0.75rem;font-size:0.9rem;font-weight:700;cursor:pointer;transition:opacity 0.15s;}
.btn-auth:hover{opacity:0.85;}
.auth-msg{font-size:0.75rem;text-align:center;margin-top:0.6rem;min-height:1.2em;}
.auth-msg.err{color:var(--housing);}
.auth-msg.ok{color:var(--savings);}

/* LAYOUT */
#app{display:none;height:100vh;overflow:hidden;}
.layout{display:flex;height:100%;}

/* SIDEBAR */
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--ink);display:flex;flex-direction:column;padding:1.25rem 0;overflow-y:auto;}
.sb-logo{display:flex;align-items:center;gap:0.6rem;padding:0 1.25rem 1.5rem;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:0.75rem;}
.sb-logo .lmark{width:30px;height:30px;border-radius:7px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:800;color:var(--ink);}
.sb-logo span{font-size:1rem;font-weight:800;color:#fff;letter-spacing:-0.03em;}
.sb-section{padding:0 0.75rem;margin-bottom:0.25rem;}
.sb-slabel{font-size:0.58rem;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:rgba(255,255,255,0.25);padding:0 0.5rem;margin-bottom:0.3rem;margin-top:0.85rem;font-family:'JetBrains Mono',monospace;}
.sb-item{display:flex;align-items:center;gap:0.6rem;padding:0.55rem 0.75rem;border-radius:7px;cursor:pointer;font-size:0.82rem;font-weight:600;color:rgba(255,255,255,0.5);transition:all 0.12s;border:none;background:none;width:100%;text-align:left;}
.sb-item:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.85);}
.sb-item.active{background:rgba(255,255,255,0.12);color:#fff;}
.sb-item .icon{font-size:0.95rem;width:20px;text-align:center;}
.sb-bottom{margin-top:auto;padding:1rem 0.75rem 0;border-top:1px solid rgba(255,255,255,0.08);}
.user-chip{display:flex;align-items:center;gap:0.6rem;padding:0.5rem 0.75rem;background:rgba(255,255,255,0.07);border-radius:7px;}
.user-av{width:26px;height:26px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:800;color:var(--ink);flex-shrink:0;}
.user-em{font-size:0.68rem;color:rgba(255,255,255,0.4);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;font-family:'JetBrains Mono',monospace;}
.btn-out{background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:0.9rem;transition:color 0.15s;flex-shrink:0;}
.btn-out:hover{color:var(--housing);}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:2rem 2rem 4rem;}
.section{display:none;}
.section.active{display:block;}

/* PAGE HEADER */
.pg-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:2px solid var(--ink);flex-wrap:wrap;gap:0.75rem;}
.pg-header h1{font-size:clamp(1.4rem,4vw,1.9rem);font-weight:800;letter-spacing:-0.04em;line-height:1;}
.pg-header p{font-size:0.72rem;color:var(--ink3);margin-top:4px;letter-spacing:0.08em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;}

/* SUMMARY CARDS */
.scards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:0.85rem;margin-bottom:1.75rem;}
.scard{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:1rem 1.25rem;}
.scard.dark{background:var(--ink);border-color:var(--ink);}
.sl{font-size:0.62rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink3);font-family:'JetBrains Mono',monospace;margin-bottom:0.4rem;}
.scard.dark .sl{color:rgba(255,255,255,0.35);}
.sv{font-size:1.45rem;font-weight:800;letter-spacing:-0.03em;line-height:1;}
.scard.dark .sv{color:#fff;}
.ss{font-size:0.64rem;color:var(--ink3);margin-top:4px;font-family:'JetBrains Mono',monospace;}
.scard.dark .ss{color:rgba(255,255,255,0.25);}
.sv.c-red{color:var(--housing);}
.sv.c-blue{color:var(--vehicle);}
.sv.c-green{color:var(--savings);}
.sv.c-amber{color:var(--misc);}

/* STACKED BAR */
.bar-panel{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:1.1rem 1.25rem;margin-bottom:1.5rem;}
.bar-top{display:flex;justify-content:space-between;font-size:0.65rem;font-family:'JetBrains Mono',monospace;color:var(--ink3);margin-bottom:0.6rem;text-transform:uppercase;letter-spacing:0.08em;}
.stacked{display:flex;height:12px;border-radius:99px;overflow:hidden;gap:2px;}
.seg{border-radius:99px;}
.legend-row{display:flex;flex-wrap:wrap;gap:0.5rem 1rem;margin-top:0.85rem;}
.leg-item{display:flex;align-items:center;gap:0.4rem;font-size:0.67rem;color:var(--ink2);font-family:'JetBrains Mono',monospace;}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* SECTION HEAD */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.6rem;margin-top:1.5rem;}
.sec-head:first-of-type{margin-top:0;}
.sec-label{display:flex;align-items:center;gap:0.5rem;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;font-family:'JetBrains Mono',monospace;}
.cdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.sec-sum{font-family:'JetBrains Mono',monospace;font-size:0.82rem;font-weight:500;color:var(--ink2);}

/* EXPENSE TABLE */
.etable{background:var(--card);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:0.5rem;}
.erow{display:grid;grid-template-columns:1fr auto auto auto;gap:0.75rem;align-items:center;padding:0.65rem 1.1rem;border-bottom:1px solid var(--border);font-size:0.8rem;transition:background 0.12s;}
.erow:last-child{border-bottom:none;}
.erow:hover{background:var(--card2);}
.ename{color:var(--ink);}
.etag{font-size:0.58rem;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.08em;padding:2px 6px;border-radius:4px;background:var(--border);color:var(--ink3);white-space:nowrap;}
.etag.loan{background:rgba(192,57,43,0.1);color:var(--housing);}
.etag.recurring{background:rgba(36,113,163,0.1);color:var(--vehicle);}
.etag.variable{background:rgba(211,84,0,0.1);color:var(--food);}
.etag.education{background:rgba(125,60,152,0.1);color:var(--kids);}
.etag.utility_{background:rgba(30,132,73,0.1);color:var(--utility);}
.etag.savings_{background:rgba(39,174,96,0.1);color:var(--savings);}
.etag.insurance_{background:rgba(22,160,133,0.1);color:var(--insurance);}
.etag.giving{background:rgba(183,149,11,0.1);color:var(--misc);}
.eamt{font-family:'JetBrains Mono',monospace;font-size:0.82rem;font-weight:500;white-space:nowrap;text-align:right;}

/* PROGRESS */
.pb-wrap{margin-bottom:0.85rem;}
.pb-info{display:flex;justify-content:space-between;margin-bottom:0.3rem;}
.pb-label{font-size:0.78rem;font-weight:600;}
.pb-val{font-size:0.72rem;color:var(--ink3);font-family:'JetBrains Mono',monospace;}
.pb-track{height:8px;background:var(--border);border-radius:99px;overflow:hidden;}
.pb-fill{height:100%;border-radius:99px;transition:width 0.4s ease;}
.pb-warn{font-size:0.68rem;color:var(--housing);margin-top:3px;}

/* DEBT/GOAL CARDS */
.dcard,.gcard{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:1.1rem;margin-bottom:0.75rem;}
.dcard-top,.gcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.75rem;}
.dcard-name,.gcard-name{font-weight:700;font-size:0.92rem;}
.dcard-cat,.gcard-date{font-size:0.65rem;color:var(--ink3);margin-top:2px;font-family:'JetBrains Mono',monospace;}
.dcard-right{text-align:right;}
.dcard-rem{font-size:1.05rem;font-weight:800;color:var(--housing);}
.dcard-mo{font-size:0.68rem;color:var(--ink3);font-family:'JetBrains Mono',monospace;}
.dcard-meta,.gcard-amts{display:flex;justify-content:space-between;font-size:0.72rem;color:var(--ink3);margin-bottom:0.4rem;font-family:'JetBrains Mono',monospace;}
.dcard-footer{display:flex;justify-content:space-between;align-items:center;margin-top:0.5rem;}
.dcard-pct{font-size:0.68rem;color:var(--ink3);font-family:'JetBrains Mono',monospace;}

/* NET WORTH */
.nwrow{display:flex;justify-content:space-between;align-items:center;padding:0.65rem 0;border-bottom:1px solid var(--border);}
.nwrow:last-child{border-bottom:none;}

/* PANEL */
.panel{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:1rem;}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.panel-title{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink3);font-family:'JetBrains Mono',monospace;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.chart-wrap{position:relative;height:220px;}

/* FORMS */
.frow{display:grid;gap:0.75rem;margin-bottom:0.75rem;}
.frow.c2{grid-template-columns:1fr 1fr;}
.fld{display:flex;flex-direction:column;gap:4px;}
.fld label{font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink3);font-family:'JetBrains Mono',monospace;}
.fld input,.fld select{background:var(--bg);border:1.5px solid var(--border2);border-radius:8px;padding:0.55rem 0.8rem;color:var(--ink);font-size:0.85rem;outline:none;transition:border-color 0.15s;}
.fld input:focus,.fld select:focus{border-color:var(--ink);}
.btn{padding:0.5rem 1.1rem;border-radius:7px;font-size:0.8rem;font-weight:700;cursor:pointer;border:none;transition:all 0.15s;white-space:nowrap;}
.btn:hover{opacity:0.82;}
.btn-dark{background:var(--ink);color:var(--bg);}
.btn-ghost{background:transparent;color:var(--ink2);border:1.5px solid var(--border2);}
.btn-ghost:hover{background:var(--card2);}
.btn-del{background:rgba(192,57,43,0.08);color:var(--housing);border:1.5px solid rgba(192,57,43,0.2);}
.btn-sm{padding:0.3rem 0.7rem;font-size:0.68rem;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,23,19,0.6);z-index:100;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:1.75rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15);}
.modal h3{font-size:1.05rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:1.25rem;}
.modal-actions{display:flex;gap:0.5rem;justify-content:flex-end;margin-top:1.25rem;}

/* TOAST */
#toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;background:var(--ink);color:var(--bg);border-radius:8px;padding:0.7rem 1.25rem;font-size:0.8rem;font-weight:600;transform:translateY(60px);opacity:0;transition:all 0.25s;pointer-events:none;}
#toast.show{transform:translateY(0);opacity:1;}
#toast.err{background:var(--housing);}

/* MISC */
.misc-budget-bar{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:1.1rem 1.25rem;margin-bottom:1.1rem;}
.misc-bar-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;}
.misc-bar-title{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink2);font-family:'JetBrains Mono',monospace;}
.misc-bar-amt{font-size:0.72rem;color:var(--ink3);font-family:'JetBrains Mono',monospace;}
.misc-bar-amt strong{color:var(--misc);font-size:1rem;font-weight:800;}
.misc-track{height:10px;background:var(--border);border-radius:99px;overflow:hidden;}
.misc-fill{height:100%;background:var(--misc);border-radius:99px;transition:width 0.4s ease;}
.misc-fill.over{background:var(--housing);}
.log-tbl{background:var(--card);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;}
.log-thead{display:grid;grid-template-columns:90px 1fr 100px 90px 32px;gap:0.5rem;padding:0.55rem 1.1rem;background:var(--card2);border-bottom:1.5px solid var(--border);font-size:0.6rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink3);font-family:'JetBrains Mono',monospace;}
.log-row{display:grid;grid-template-columns:90px 1fr 100px 90px 32px;gap:0.5rem;align-items:center;padding:0.62rem 1.1rem;border-bottom:1px solid var(--border);font-size:0.78rem;transition:background 0.12s;}
.log-row:last-child{border-bottom:none;}
.log-row:hover{background:var(--card2);}
.log-date{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--ink3);}
.log-cat{font-size:0.6rem;font-family:'JetBrains Mono',monospace;text-transform:uppercase;padding:2px 6px;border-radius:4px;background:var(--border);color:var(--ink3);width:fit-content;}
.log-amt{font-family:'JetBrains Mono',monospace;font-size:0.78rem;font-weight:600;text-align:right;}
.log-del{background:none;border:none;cursor:pointer;color:var(--ink4);font-size:0.85rem;padding:2px;border-radius:4px;transition:color 0.15s;text-align:center;}
.log-del:hover{color:var(--housing);}
.tip-box{background:#fef9e7;border:1.5px solid #f7dc6f;border-radius:10px;padding:1rem 1.25rem;margin-bottom:0.85rem;font-size:0.8rem;color:var(--ink2);line-height:1.6;}
.tip-box strong{display:block;margin-bottom:0.3rem;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:#b7950b;font-family:'JetBrains Mono',monospace;}
.empty{text-align:center;padding:2.5rem;color:var(--ink3);}
.empty .ei{font-size:2rem;margin-bottom:0.5rem;}
.empty p{font-size:0.8rem;}
.mob-bar{display:none;background:var(--ink);padding:0.75rem 1rem;align-items:center;justify-content:space-between;}
.mob-menu{background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;}
@media(max-width:768px){
  .sidebar{position:fixed;left:-100%;top:0;height:100%;z-index:50;transition:left 0.25s ease;}
  .sidebar.open{left:0;}
  .mob-bar{display:flex;}
  .main{padding:1rem 1rem 4rem;}
  .scards{grid-template-columns:1fr 1fr;}
  .grid2{grid-template-columns:1fr;}
  .frow.c2{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo"><div class="lmark">B</div><span>Bajet</span></div>
    <h2>Selamat Datang</h2>
    <p>Personal finance dashboard · Secure login</p>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="authTab('login')">Login</button>
      <button class="auth-tab" onclick="authTab('register')">Register</button>
    </div>
    <div id="login-form">
      <div class="afield"><label>Email</label><input type="email" id="l-email" placeholder="you@email.com"/></div>
      <div class="afield"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••"/></div>
      <button class="btn-auth" onclick="doLogin()">Sign In</button>
      <div class="auth-msg" id="l-msg"></div>
    </div>
    <div id="register-form" style="display:none;">
      <div class="afield"><label>Email</label><input type="email" id="r-email" placeholder="you@email.com"/></div>
      <div class="afield"><label>Password</label><input type="password" id="r-pass" placeholder="Min 6 characters"/></div>
      <button class="btn-auth" onclick="doRegister()">Create Account</button>
      <div class="auth-msg" id="r-msg"></div>
    </div>
  </div>
</div>

<div id="app">
  <div class="layout">
    <nav class="sidebar" id="sidebar">
      <div class="sb-logo"><div class="lmark">B</div><span>Bajet</span></div>
      <div class="sb-section">
        <div class="sb-slabel">Main</div>
        <button class="sb-item active" onclick="nav('dashboard')"><span class="icon">📊</span>Dashboard</button>
        <button class="sb-item" onclick="nav('transactions')"><span class="icon">💳</span>Transactions</button>
        <button class="sb-item" onclick="nav('budget')"><span class="icon">🎯</span>Monthly Budget</button>
        <button class="sb-item" onclick="nav('misc')"><span class="icon">🧾</span>Misc Log</button>
      </div>
      <div class="sb-section">
        <div class="sb-slabel">Analytics</div>
        <button class="sb-item" onclick="nav('analytics')"><span class="icon">📈</span>Analytics</button>
      </div>
      <div class="sb-section">
        <div class="sb-slabel">Planning</div>
        <button class="sb-item" onclick="nav('savings')"><span class="icon">💰</span>Savings Goals</button>
        <button class="sb-item" onclick="nav('debt')"><span class="icon">🏦</span>Debt Manager</button>
        <button class="sb-item" onclick="nav('wealth')"><span class="icon">📉</span>Net Worth</button>
      </div>
      <div class="sb-section">
        <div class="sb-slabel">Account</div>
        <button class="sb-item" onclick="nav('settings')"><span class="icon">⚙️</span>Settings</button>
      </div>
      <div class="sb-bottom">
        <div class="user-chip">
          <div class="user-av" id="user-av">U</div>
          <div class="user-em" id="user-em">—</div>
          <button class="btn-out" onclick="doLogout()">⏻</button>
        </div>
      </div>
    </nav>

    <div class="main">
      <div class="mob-bar">
        <button class="mob-menu" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <span style="font-weight:800;color:#fff;letter-spacing:-0.02em;">Bajet</span>
        <span></span>
      </div>

      <!-- DASHBOARD -->
      <div class="section active" id="sec-dashboard">
        <div class="pg-header">
          <div><h1>Dashboard</h1><p>Financial Snapshot · <span id="dash-month-lbl">—</span></p></div>
          <button class="btn btn-dark" onclick="nav('transactions');setTimeout(openAddTxn,100)">+ Add Transaction</button>

function pbHtml(label,spent,budget,color){
  const p=pct(spent,budget);const over=spent>budget;
  return `<div class="pb-wrap"><div class="pb-info"><span class="pb-label">${label}</span><span class="pb-val">${fmt(spent)} / ${fmt(budget)}</span></div><div class="pb-track"><div class="pb-fill" style="width:${p}%;background:${over?'var(--housing)':color};"></div></div>${over?`<div class="pb-warn">⚠️ Over by ${fmt(spent-budget)}</div>`:''}</div>`;
}

function drawBar(barId,legId,totalId,cats,amts,colors){
  const total=amts.reduce((a,b)=>a+b,0);
  if(totalId)document.getElementById(totalId).textContent=fmt(total);
  const bar=document.getElementById(barId);bar.innerHTML='';
  const leg=document.getElementById(legId);leg.innerHTML='';
  cats.forEach((c,i)=>{
    if(amts[i]<=0)return;
    const p=(amts[i]/total*100).toFixed(1);
    const seg=document.createElement('div');seg.className='seg';seg.style.cssText=`width:${p}%;background:${colors[i]};`;bar.appendChild(seg);
    const li=document.createElement('div');li.className='leg-item';li.innerHTML=`<div class="leg-dot" style="background:${colors[i]};"></div>${c} ${p}%`;leg.appendChild(li);
  });
}

    db.from('debts').select('*').eq('user_id',uid()),

  ]);
  const inc=(txns||[]).filter(t=>t.type==='income').reduce((a,t)=>a+parseFloat(t.amount),0);

  document.getElementById('dash-recent').innerHTML=recent.length?`<div class="etable">${recent.map(t=>`<div class="erow"><span class="ename">${t.description}</span><span class="etag ${catConf(t.category).tag}">${t.category}</span><span class="eamt" style="color:${t.type==='income'?'var(--savings)':'var(--ink)'}">${t.type==='income'?'+':'−'}${fmt2(t.amount)}</span><span></span></div>`).join('')}</div>`:'<div class="empty"><div class="ei">💳</div><p>No transactions this month</p></div>';

  const expBC={};(txns||[]).filter(t=>t.type==='expense').forEach(t=>{expBC[t.category]=(expBC[t.category]||0)+parseFloat(t.amount);});
  document.getElementById('dash-budgets').innerHTML=budgets?.length

/* TRANSACTIONS - itemized by category */
async function loadTransactions(){
  document.getElementById('txn-month').textContent=mLbl(CUR_MONTH);
  const s=CUR_MONTH+'-01',e=new Date(+CUR_MONTH.split('-')[0],+CUR_MONTH.split('-')[1],0).toISOString().slice(0,10);
  const{data}=await db.from('expenses').select('*').eq('user_id',uid()).gte('date',s).lte('date',e).order('date',{ascending:false});
  const inc=(data||[]).filter(t=>t.type==='income').reduce((a,t)=>a+parseFloat(t.amount),0);
  const exp=(data||[]).filter(t=>t.type==='expense').reduce((a,t)=>a+parseFloat(t.amount),0);
  document.getElementById('txn-summary').innerHTML=`
    <div class="scard dark"><div class="sl">Income</div><div class="sv">${fmt(inc)}</div></div>
    <div class="scard"><div class="sl">Expenses</div><div class="sv c-red">${fmt(exp)}</div></div>
    <div class="scard"><div class="sl">Balance</div><div class="sv ${inc-exp>=0?'c-green':'c-red'}">${fmt(inc-exp)}</div></div>
    <div class="scard"><div class="sl">Transactions</div><div class="sv">${data?.length||0}</div></div>`;
  if(!data?.length){document.getElementById('txn-by-cat').innerHTML='<div class="empty"><div class="ei">📭</div><p>No transactions this month</p></div>';return;}
  
  const byCat={};
  data.forEach(t=>{if(!byCat[t.category])byCat[t.category]=[];byCat[t.category].push(t);});
  let html='';
  Object.entries(byCat).sort((a,b)=>b[1].reduce((x,t)=>x+parseFloat(t.amount),0)-a[1].reduce((x,t)=>x+parseFloat(t.amount),0)).forEach(([cat,txns])=>{
    const total=txns.reduce((a,t)=>a+parseFloat(t.amount),0);
    const cf=catConf(cat);
    html+=`<div class="sec-head"><div class="sec-label"><div class="cdot" style="background:${cf.dot};"></div>${cf.icon} ${cat}</div><div class="sec-sum">${fmt(total)}</div></div>
    <div class="etable">${txns.map(t=>`<div class="erow">
      <span class="ename">${t.description}</span>
      <span class="etag">${t.date}</span>
      <span class="eamt">${fmt2(t.amount)}</span>
      <div style="display:flex;gap:0.3rem;">
        <button class="btn btn-ghost btn-sm" onclick="editTxn('${t.id}')">✏️</button>
        <button class="btn btn-del btn-sm" onclick="deleteTxn('${t.id}')">🗑</button>
      </div>
    </div>`).join('')}</div>`;
  });
  document.getElementById('txn-by-cat').innerHTML=html;
}

/* ANALYTICS */
async function loadAnalytics(){
  const months=[];const d=new Date();
  for(let i=5;i>=0;i--){const dd=new Date(d.getFullYear(),d.getMonth()-i,1);months.push(dd.toISOString().slice(0,7));}
  const{data:all}=await db.from('expenses').select('*').eq('user_id',uid()).gte('date',months[0]+'-01');
  const byM={};months.forEach(m=>{byM[m]={inc:0,exp:0};});
  (all||[]).forEach(t=>{const m=t.date.slice(0,7);if(byM[m]){if(t.type==='income')byM[m].inc+=parseFloat(t.amount);else byM[m].exp+=parseFloat(t.amount);}});
  const exps=months.map(m=>byM[m].exp),incs=months.map(m=>byM[m].inc);
  const avg=exps.reduce((a,b)=>a+b,0)/exps.length,maxE=Math.max(...exps);
  const nowM=new Date().toISOString().slice(0,7);
  const catT={};(all||[]).filter(t=>t.date.startsWith(nowM)&&t.type==='expense').forEach(t=>{catT[t.category]=(catT[t.category]||0)+parseFloat(t.amount);});
  const top=Object.entries(catT).sort((a,b)=>b[1]-a[1])[0];
  const tInc=(all||[]).filter(t=>t.date.startsWith(nowM)&&t.type==='income').reduce((a,t)=>a+parseFloat(t.amount),0);
  const tExp=(all||[]).filter(t=>t.date.startsWith(nowM)&&t.type==='expense').reduce((a,t)=>a+parseFloat(t.amount),0);
  const sr=tInc>0?(((tInc-tExp)/tInc)*100).toFixed(0)+'%':'N/A';
  document.getElementById('an-avg').textContent=fmt(avg);
  document.getElementById('an-high').textContent=fmt(maxE);
  document.getElementById('an-top').textContent=top?top[0]:'—';
  document.getElementById('an-rate').textContent=sr;
  if(trendChart)trendChart.destroy();
  trendChart=new Chart(document.getElementById('trend-chart').getContext('2d'),{type:'bar',data:{labels:months.map(m=>mLbl(m).split(' ')[0]),datasets:[{label:'Income',data:incs,backgroundColor:'rgba(30,132,73,0.7)',borderRadius:4},{label:'Expense',data:exps,backgroundColor:'rgba(192,57,43,0.7)',borderRadius:4}]},options:{plugins:{legend:{labels:{color:'#9a9188',font:{size:10}}}},scales:{x:{ticks:{color:'#9a9188',font:{size:10}}},y:{ticks:{color:'#9a9188',font:{size:10},callback:v=>'RM'+v.toLocaleString()}}}}});
  if(catChart)catChart.destroy();
  const cats=Object.keys(catT),amts=Object.values(catT),colors=cats.map(c=>catConf(c).dot);
  if(cats.length)catChart=new Chart(document.getElementById('cat-chart').getContext('2d'),{type:'doughnut',data:{labels:cats,datasets:[{data:amts,backgroundColor:colors,borderWidth:0}]},options:{plugins:{legend:{position:'bottom',labels:{color:'#9a9188',font:{size:10,family:'JetBrains Mono'},boxWidth:10}}},cutout:'60%'}});
  const pred=avg*1.02;
  const topCats=Object.entries(catT).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k,v])=>`<strong>${k}</strong> (${fmt(v)})`).join(', ');
  document.getElementById('prediction').innerHTML=`Berdasarkan 6 bulan lepas, anggaran perbelanjaan bulan depan ialah <strong style="color:var(--misc)">${fmt(pred)}</strong>.<br/>Kategori teratas: ${topCats||'—'}.<br/>${tInc>0?`Savings rate bulan ini: <strong style="color:var(--savings)">${sr}</strong>.`:'Tambah transaksi pendapatan untuk lihat savings rate.'}`;
}

async function loadWealth(){
  const[{data:assets},{data:debts}]=await Promise.all([db.from('assets').select('*').eq('user_id',uid()),db.from('debts').select('*').eq('user_id',uid())]);
  const tA=(assets||[]).reduce((a,x)=>a+parseFloat(x.value),0);
  const tL=(debts||[]).reduce((a,d)=>a+parseFloat(d.remaining_amount),0);
  const net=tA-tL;
  document.getElementById('w-assets').textContent=fmt(tA);document.getElementById('w-liab').textContent=fmt(tL);
  document.getElementById('w-net').textContent=fmt(net);document.getElementById('w-net').style.color=net>=0?'var(--savings)':'var(--housing)';
  document.getElementById('w-a-sum').textContent=fmt(tA);document.getElementById('w-l-sum').textContent=fmt(tL);
  const aC={property:'#2471a3',vehicle:'#d35400',savings:'#1e8449',investment:'#7d3c98',cash:'#b7950b',other:'#5d6d7e'};
  document.getElementById('assets-list').innerHTML=(assets||[]).length
    ?(assets||[]).map(a=>`<div class="erow"><span class="ename">${a.name}</span><span class="etag" style="background:${aC[a.category]||'#5d6d7e'}22;color:${aC[a.category]||'#5d6d7e'}">${a.category}</span><span class="eamt" style="color:var(--savings)">${fmt(a.value)}</span><button class="btn btn-del btn-sm" onclick="deleteAsset('${a.id}')">🗑</button></div>`).join('')
    :'<div class="empty"><p>No assets added</p></div>';
  document.getElementById('liab-list').innerHTML=(debts||[]).length
    ?(debts||[]).map(d=>`<div class="erow"><span class="ename">${d.name}</span><span class="etag loan">${d.category}</span><span class="eamt" style="color:var(--housing)">${fmt(d.remaining_amount)}</span><span></span></div>`).join('')
    :'<div class="empty"><p>No debts tracked</p></div>';
}
function openAddAsset(){['asset-id','asset-name','asset-val'].forEach(id=>document.getElementById(id).value='');openM('m-asset');}
async function saveAsset(){
  const row={user_id:uid(),name:document.getElementById('asset-name').value,category:document.getElementById('asset-cat').value,value:parseFloat(document.getElementById('asset-val').value)};
  if(!row.name||isNaN(row.value)){toast('Fill in all fields','err');return;}
  await db.from('assets').insert(row);closeM('m-asset');toast('Saved ✓');loadWealth();
}
async function deleteAsset(id){if(!confirm('Delete?'))return;await db.from('assets').delete().eq('id',id);toast('Deleted');loadWealth();}

document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
document.getElementById('misc-date').valueAsDate=new Date();
document.getElementById('b-month').value=new Date().toISOString().slice(0,7);
<\/script>
</script>
